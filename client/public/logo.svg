<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#020408"/>

  <!-- Hex outline -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="#020408" stroke="#00c2ff" stroke-width="2.5"/>

  <!-- Left chain ring -->
  <circle cx="18" cy="32" r="8" fill="none" stroke="#00c2ff" stroke-width="2.5"/>
  <circle cx="18" cy="32" r="3.5" fill="#00c2ff" opacity="0.3"/>

  <!-- Right chain ring -->
  <circle cx="46" cy="32" r="8" fill="none" stroke="#00c2ff" stroke-width="2.5"/>
  <circle cx="46" cy="32" r="3.5" fill="#00c2ff" opacity="0.3"/>

  <!-- Connecting bar -->
  <rect x="22" y="28.5" width="20" height="7" rx="3.5" fill="#00c2ff"/>

  <!-- Arrow / runner -->
  <polygon points="26,22 46,32 26,42 32,32" fill="#00ff88"/>

  <!-- Speed lines -->
  <line x1="8"  y1="28" x2="16" y2="28" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="6"  y1="32" x2="15" y2="32" stroke="#00ff88" stroke-width="2"   opacity="0.7"/>
  <line x1="8"  y1="36" x2="16" y2="36" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>

  <!-- Corner dots -->
  <circle cx="8"  cy="18" r="2" fill="#00c2ff" opacity="0.7"/>
  <circle cx="56" cy="18" r="2" fill="#00c2ff" opacity="0.7"/>
  <circle cx="8"  cy="46" r="2" fill="#00c2ff" opacity="0.7"/>
  <circle cx="56" cy="46" r="2" fill="#00c2ff" opacity="0.7"/>
</svg>